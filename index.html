<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanjay Prasanna</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body {
  background:
    radial-gradient(circle at 20% 10%, rgba(0,180,216,0.08), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(0,119,182,0.1), transparent 40%),
    #020c14;
  color: #e2e8f0;
  font-family: Arial;
}

/* floating animation */
@keyframes floaty {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

#chatbotIcon {
  animation: floaty 3s ease-in-out infinite;
  transition: transform 0.2s;
}

#chatbotIcon:hover {
  transform: scale(1.1);
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(0,180,216,0.2);
  margin-bottom: 15px;
}

.heading {
  color: #00b4d8;
  font-size: 26px;
  margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl font-bold text-center">Sanjay Prasanna</h1>

<div class="heading mt-8">Experience</div>

<div class="card">SLASE – Vue + Java, AI Integration</div>
<div class="card">RBC – Angular Migration</div>
<div class="card">Healthcare – Secure Apps</div>

<div class="heading mt-8">Contact</div>

<div class="card">📧 sanjucena09@gmail.com</div>
<div class="card">📱 9715788484</div>

</div>

<!-- CHATBOT -->
<div id="chatbot" class="fixed bottom-6 right-6 cursor-pointer z-50">

<img src="https://raw.githubusercontent.com/sanjucena/sanju-resume/main/chutki.jpg"
     id="chatbotIcon"
     onerror="this.src='https://via.placeholder.com/80?text=C'"
     class="w-20 h-20 rounded-full object-cover border-2 border-[#00b4d8] shadow-lg">

</div>

<!-- CHATBOX -->
<div id="chatbox"
class="hidden fixed bottom-28 right-6 w-80 bg-[#0f172a] p-4 rounded-xl border border-[#00b4d8]">

<div class="flex items-center gap-3 mb-3">

<img src="https://raw.githubusercontent.com/sanjucena/sanju-resume/main/chutki.jpg"
     class="w-10 h-10 rounded-full object-cover">

<div>
<p class="text-[#00b4d8] font-bold">Chutki</p>
<p class="text-xs text-gray-400">Hi 😊</p>
</div>

</div>

<div id="chatlog" class="h-40 overflow-y-auto text-sm mb-2"></div>

<input id="userInput"
class="w-full p-2 rounded bg-slate-800 text-white"
placeholder="Ask something..."
onkeydown="handleKey(event)">

</div>

<script>

/* toggle */
document.getElementById("chatbot").onclick = () => {
  document.getElementById("chatbox").classList.toggle("hidden");
};

/* drag */
const chatbot = document.getElementById("chatbot");

let isDragging=false,offsetX,offsetY;

chatbot.addEventListener("mousedown",(e)=>{
isDragging=true;
offsetX=e.clientX-chatbot.offsetLeft;
offsetY=e.clientY-chatbot.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(isDragging){
chatbot.style.left=(e.clientX-offsetX)+"px";
chatbot.style.top=(e.clientY-offsetY)+"px";
chatbot.style.right="auto";
chatbot.style.bottom="auto";
}
});

document.addEventListener("mouseup",()=>isDragging=false);

/* mobile drag */
chatbot.addEventListener("touchstart",(e)=>{
isDragging=true;
offsetX=e.touches[0].clientX-chatbot.offsetLeft;
offsetY=e.touches[0].clientY-chatbot.offsetTop;
});

document.addEventListener("touchmove",(e)=>{
if(isDragging){
chatbot.style.left=(e.touches[0].clientX-offsetX)+"px";
chatbot.style.top=(e.touches[0].clientY-offsetY)+"px";
}
});

document.addEventListener("touchend",()=>isDragging=false);

</script>

</body>
</html>
