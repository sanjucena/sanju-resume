<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjay Prasanna | AI Engineer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #e2e8f0;
  font-family: Arial, sans-serif;
}

/* cards */
.card {
  background: rgba(30,41,59,0.6);
  border: 1px solid rgba(148,163,184,0.1);
  border-radius: 12px;
  padding: 20px;
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(99,102,241,0.2);
}

/* fade animation */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s ease;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* gradient text */
.gradient {
  background: linear-gradient(90deg,#38bdf8,#6366f1,#8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="text-center py-20 fade">
  <img src="profile.jpg" class="mx-auto w-40 h-40 rounded-full border-4 border-indigo-500 mb-6">

  <h1 class="text-4xl font-bold">
    Sanjay <span class="gradient">Prasanna</span>
  </h1>

  <p class="mt-3 text-gray-400">
    Senior AI & Full-Stack Engineer • 10+ Years
  </p>

  <div class="mt-6">
    <a href="/resume.pdf" class="bg-indigo-600 px-5 py-2 rounded-lg mr-2">Resume</a>
    <a href="#contact" class="border border-indigo-500 px-5 py-2 rounded-lg">Hire Me</a>
  </div>
</section>

<!-- SKILLS -->
<section class="py-12 fade">
  <h2 class="text-2xl font-bold text-center mb-8">Skills</h2>

  <div class="grid md:grid-cols-2 gap-4 max-w-4xl mx-auto px-4">
    <div class="card">Java, Node.js, Spring Boot</div>
    <div class="card">Angular, Vue, TypeScript</div>
    <div class="card">DevSecOps (Snyk, AquaScan, CI/CD)</div>
    <div class="card">OpenShift, Cloud Deployment</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-16 text-center fade">
  <h2 class="text-2xl font-bold mb-6">Contact</h2>

  <div class="space-y-4">

    <a href="mailto:sanjucena09@gmail.com"
       class="block bg-indigo-600 px-6 py-3 rounded-lg w-fit mx-auto">
       📧 Email Me
    </a>

    <a href="tel:+919715788484"
       class="block border border-indigo-500 px-6 py-3 rounded-lg w-fit mx-auto">
       📱 Call: +91 97157 88484
    </a>

    <a href="https://www.linkedin.com/in/sanjay-prasanna-a831b273"
       target="_blank"
       class="block border border-gray-600 px-6 py-3 rounded-lg w-fit mx-auto">
       💼 LinkedIn
    </a>

  </div>
</section>

<!-- CHATBOT -->
<div class="fixed bottom-5 right-5">
  <button onclick="toggleChat()" class="bg-indigo-600 px-4 py-3 rounded-full">💬</button>

  <div id="chatbox" class="hidden mt-2 w-80 bg-slate-900 p-4 rounded-xl">
    <div id="chatlog" class="text-sm space-y-2 mb-3 h-52 overflow-y-auto"></div>

    <input id="userInput" type="text" placeholder="Ask about me..."
    class="w-full p-2 rounded bg-slate-800 text-white"
    onkeydown="handleKey(event)">

    <div class="flex flex-wrap gap-2 mt-2">
      <button onclick="askQuick('What is your experience')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Experience</button>
      <button onclick="askQuick('What are your skills')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Skills</button>
      <button onclick="askQuick('Explain your projects')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Projects</button>
    </div>
  </div>
</div>

<script>
// scroll animation
const items = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
  items.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

// chat toggle
function toggleChat(){
  document.getElementById('chatbox').classList.toggle('hidden');
}

// quick buttons
function askQuick(text){
  document.getElementById('userInput').value = text;
  handleKey({ key: 'Enter', target: document.getElementById('userInput') });
}

// chatbot
async function handleKey(e){
  if(e.key === 'Enter'){
    let input = e.target.value.trim();
    if(!input) return;

    let log = document.getElementById("chatlog");

    log.innerHTML += "<div>👤 "+input+"</div>";
    log.innerHTML += "<div class='text-gray-400'>🤖 Thinking...</div>";

    try {
      let response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input })
      });

      let data = await response.json();

      log.lastChild.remove();
      log.innerHTML += "<div class='text-indigo-400'>🤖 "+data.reply+"</div>";
    } catch {
      log.lastChild.remove();
      log.innerHTML += "<div class='text-red-400'>⚠️ Error connecting to AI</div>";
    }

    e.target.value="";
    log.scrollTop = log.scrollHeight;
  }
}
</script>

</body>
</html>
