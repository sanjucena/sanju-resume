<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanjay Prasanna | AI Engineer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top,#0f172a,#020617);
  color: #e2e8f0;
  font-family: Arial;
}

.card {
  background: rgba(30,41,59,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(148,163,184,0.1);
  transition: 0.4s;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 0 25px rgba(99,102,241,0.2);
}

.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.gradient {
  background: linear-gradient(90deg,#38bdf8,#6366f1,#8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="text-center py-24 fade">
<img src="profile.jpg" class="mx-auto w-44 h-44 rounded-full border-4 border-indigo-500 shadow-xl mb-6">

<h1 class="text-5xl font-bold">
Sanjay <span class="gradient">Prasanna</span>
</h1>

<p class="mt-4 text-lg text-gray-400">
Senior AI & Full-Stack Engineer • 10+ Years
</p>

<div class="mt-6 space-x-4">
<a href="/resume.pdf" class="bg-indigo-600 px-6 py-3 rounded-lg">Resume</a>
</div>
</section>

<!-- CHATBOT -->
<div class="fixed bottom-5 right-5">
<button onclick="toggleChat()" class="bg-indigo-600 px-4 py-3 rounded-full text-white shadow-xl">💬</button>

<div id="chatbox" class="hidden mt-2 w-80 bg-slate-900 p-4 rounded-xl shadow-xl">
<div id="chatlog" class="text-sm space-y-2 mb-3 h-52 overflow-y-auto"></div>

<input id="userInput" type="text" placeholder="Ask about me..."
class="w-full p-2 rounded bg-slate-800 text-white"
onkeydown="handleKey(event)">

<!-- QUICK BUTTONS -->
<div class="flex flex-wrap gap-2 mt-2">
<button onclick="askQuick('What is your experience')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Experience</button>
<button onclick="askQuick('What are your skills')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Skills</button>
<button onclick="askQuick('Explain your projects')" class="text-xs bg-indigo-600 px-2 py-1 rounded">Projects</button>
</div>

</div>
</div>

<script>
// animation
const items = document.querySelectorAll('.fade');
window.addEventListener('scroll', ()=>{
items.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-50){
el.classList.add('show');
}
})
});

// toggle chat
function toggleChat(){
document.getElementById('chatbox').classList.toggle('hidden');
}

// quick ask
function askQuick(text){
document.getElementById('userInput').value = text;
handleKey({ key: 'Enter', target: document.getElementById('userInput') });
}

// chatbot
async function handleKey(e){
if(e.key === 'Enter'){
let input = e.target.value.trim();
if(!input) return;

let log = document.getElementById("chatlog");

log.innerHTML += "<div>👤 "+input+"</div>";
log.innerHTML += "<div class='text-gray-400'>🤖 Thinking...</div>";

let response = await fetch("/api/chat", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ message: input })
});

let data = await response.json();

log.lastChild.remove();
log.innerHTML += "<div class='text-indigo-400'>🤖 "+data.reply+"</div>";

e.target.value="";
log.scrollTop = log.scrollHeight;
}
}
</script>

</body>
</html>
